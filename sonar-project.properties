sonar.projectKey=FabrizioPerezPeralta_AnzenCore
sonar.organization=fabrizioperezperalta
sonar.projectName=AnzenCore
sonar.sources=.
sonar.tests=tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.exclusions=**/__pycache__/**, **/.venv/**, **/assets/**, tests/**, Docs/**, media/**, htmlcov/**, infra/**, src/**, agent/**, mobile/**, .streamlit/**, Plan.md, README.md, .github/workflows/**, Dockerfile*, **/.env*, **/*.yml, **/*.yaml
sonar.test.exclusions=tests/**

# -----------------------------------------------------------------------
# Issue suppressions for intentional false positives
# apk_analyzer.py holds DETECTION regexes (not real credentials).
# vulnerability_scanner.py uses temp-dir APIs, not hardcoded paths.
# -----------------------------------------------------------------------
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/apk_analyzer.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S6418
sonar.issue.ignore.multicriteria.e2.resourceKey=**/apk_analyzer.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.e3.resourceKey=**/vulnerability_scanner.py
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S2245
sonar.issue.ignore.multicriteria.e4.resourceKey=**/vulnerability_scanner.py
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.e5.resourceKey=**/vulnerability_scanner.py
sonar.issue.ignore.multicriteria.e6.ruleKey=python:S4790
sonar.issue.ignore.multicriteria.e6.resourceKey=**/supabase_model.py