name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "app.py"
      - "requirements.txt"
      - ".streamlit/**"

jobs:
  deploy:
    name: Deploy to Streamlit Community Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify app entry point
        run: python -c "import app"

      - name: Notify deploy
        run: |
          echo "✅ Code pushed to main — Streamlit Community Cloud will auto-deploy."
          echo "Dashboard URL: https://share.streamlit.io"