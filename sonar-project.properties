sonar.projectKey=FabrizioPerezPeralta_AnzenCore
sonar.organization=fabrizioperezperalta
sonar.projectName=AnzenCore
sonar.sources=.
sonar.tests=tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.exclusions=**/__pycache__/**, **/.venv/**, **/assets/**, tests/**, Docs/**, media/**, htmlcov/**, infra/**, src/**, agent/**, mobile/**, .streamlit/**, Plan.md, README.md, .github/workflows/**, Dockerfile*, **/.env*, **/*.yml, **/*.yaml
sonar.test.exclusions=tests/**

# Suppress false-positive security hotspots in apk_analyzer.py.
# This file intentionally defines regex patterns to detect secrets/tokens
# inside APK files — the patterns themselves are not secrets.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.e1.resourceKey=app/dashboard/services/vulnerability_scanner.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=app/dashboard/services/apk_analyzer.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S6418
sonar.issue.ignore.multicriteria.e3.resourceKey=app/dashboard/services/apk_analyzer.py